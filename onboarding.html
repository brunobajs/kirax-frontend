<!DOCTYPE html>
<html class="dark" lang="pt-BR">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>KIRAX | Onboarding IA</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <style>
        * { -webkit-tap-highlight-color: transparent; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24; }
        body { font-family: 'Inter', sans-serif; background-color: #0e0e0f; }
        .glass-panel { background: rgba(26, 25, 27, 0.6); backdrop-filter: blur(12px); }
        .neon-glow { box-shadow: 0 0 15px rgba(161, 250, 255, 0.2); }
    </style>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "on-secondary": "#390050",
                        "inverse-surface": "#fcf8f9",
                        "error-dim": "#d7383b",
                        "on-surface": "#ffffff",
                        "surface-container-low": "#131314",
                        "outline": "#767576",
                        "on-secondary-fixed-variant": "#8400b3",
                        "secondary-container": "#9900cf",
                        "surface-container-highest": "#262627",
                        "primary-container": "#00f4fe",
                        "tertiary": "#f3ffca",
                        "surface-bright": "#2c2c2d",
                        "tertiary-fixed": "#cafd00",
                        "surface": "#0e0e0f",
                        "on-tertiary-fixed": "#3a4a00",
                        "on-primary": "#006165",
                        "error": "#ff716c",
                        "on-primary-fixed": "#004346",
                        "on-secondary-container": "#fff5fc",
                        "surface-variant": "#262627",
                        "primary-fixed-dim": "#00e5ee",
                        "surface-tint": "#a1faff",
                        "on-error-container": "#ffa8a3",
                        "on-surface-variant": "#adaaab",
                        "surface-container-high": "#201f21",
                        "surface-container-lowest": "#000000",
                        "on-tertiary": "#516700",
                        "on-tertiary-container": "#4a5e00",
                        "surface-container": "#1a191b",
                        "primary-fixed": "#00f4fe",
                        "tertiary-fixed-dim": "#beee00",
                        "inverse-primary": "#006a6e",
                        "tertiary-dim": "#beee00",
                        "secondary-fixed-dim": "#eaaeff",
                        "on-background": "#ffffff",
                        "secondary-dim": "#bb00fc",
                        "background": "#0e0e0f",
                        "surface-dim": "#0e0e0f",
                        "secondary-fixed": "#f1c1ff",
                        "on-tertiary-fixed-variant": "#526900",
                        "outline-variant": "#484849",
                        "on-primary-fixed-variant": "#006266",
                        "on-primary-container": "#00575b",
                        "primary-dim": "#00e5ee",
                        "on-secondary-fixed": "#580079",
                        "on-error": "#490006",
                        "primary": "#a1faff",
                        "tertiary-container": "#cafd00",
                        "error-container": "#9f0519",
                        "inverse-on-surface": "#565556",
                        "secondary": "#d674ff"
                    },
                    fontFamily: {
                        "headline": ["Space Grotesk"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem"},
                },
            },
        }
    </script>
</head>
<body class="bg-background text-on-surface flex flex-col min-h-screen">
    <header class="fixed top-0 w-full flex justify-between items-center px-6 h-16 bg-[#0e0e0f]/80 backdrop-blur-xl z-50 border-b border-white/5">
        <div class="flex items-center gap-3">
            <span class="material-symbols-outlined text-primary">psychology</span>
            <h1 class="text-xl font-bold tracking-tighter text-primary font-headline uppercase">ONBOARDING IA</h1>
        </div>
    </header>

    <main class="flex-grow flex flex-col items-center justify-center p-6 pt-24 pb-32 max-w-4xl mx-auto w-full">
        <div id="chat-container" class="w-full space-y-6 overflow-y-auto max-h-[60vh] scrollbar-hide mb-8">
            <!-- Boas-vindas -->
            <div class="flex gap-4">
                <div class="w-8 h-8 rounded-full bg-primary/20 flex items-center justify-center shrink-0">
                    <span class="material-symbols-outlined text-primary text-sm">robot</span>
                </div>
                <div class="bg-surface-container-high p-4 rounded-sm border border-outline-variant/10 max-w-[80%]">
                    <p class="text-sm leading-relaxed">Olá! Sou a Inteligência Artificial da Kirax. Estou aqui para entender o seu negócio e configurar os melhores módulos para você. Me conte: **O que a sua empresa faz e como você vende seus produtos ou serviços?**</p>
                </div>
            </div>
        </div>

        <!-- Input Area -->
        <div class="fixed bottom-0 left-0 w-full p-6 bg-gradient-to-t from-background via-background to-transparent z-50">
            <div class="max-w-4xl mx-auto flex gap-3 bg-surface-container p-2 rounded-sm border border-outline-variant/20 neon-glow relative">
                <input id="user-input" type="text" placeholder="Ex: Sou uma loja de roupas e vendo pelo Instagram..." class="flex-grow bg-transparent border-none text-on-surface text-sm focus:ring-0 px-4" onkeypress="if(event.key === 'Enter') sendMessage()" style="touch-action: manipulation;"/>
                <button onclick="sendMessage()" class="bg-primary text-on-primary px-6 py-2 rounded-sm font-bold text-xs uppercase tracking-widest hover:brightness-110 active:scale-95 transition-all relative z-10" style="touch-action: manipulation;">
                    Enviar
                </button>
            </div>
        </div>
    </main>

    <script>
        const chatContainer = document.getElementById('chat-container');
        const userInput = document.getElementById('user-input');

        function appendMessage(role, text) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `flex gap-4 ${role === 'user' ? 'flex-row-reverse' : ''}`;
            
            const icon = role === 'user' ? 'person' : 'robot';
            const bgColor = role === 'user' ? 'bg-secondary/20' : 'bg-primary/20';
            const textColor = role === 'user' ? 'text-secondary' : 'text-primary';

            msgDiv.innerHTML = `
                <div class="w-8 h-8 rounded-full ${bgColor} flex items-center justify-center shrink-0">
                    <span class="material-symbols-outlined ${textColor} text-sm">${icon}</span>
                </div>
                <div class="${role === 'user' ? 'bg-surface-container-highest' : 'bg-surface-container-high'} p-4 rounded-sm border border-outline-variant/10 max-w-[80%]">
                    <p class="text-sm leading-relaxed">${text}</p>
                </div>
            `;
            chatContainer.appendChild(msgDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        let jwtToken = localStorage.getItem('kirax_auth_token');
        const TEST_EMPRESA_ID = '00000000-0000-0000-0000-000000000000';

        async function ensureAuth() {
            if (jwtToken) return true;
            
            console.log("Onboarding: Autenticando técnico temporário...");
            try {
                const urlParams = new URLSearchParams(window.location.search);
                const empresaId = urlParams.get('empresa_id') || TEST_EMPRESA_ID;

                const response = await fetch(KIRAX_CONFIG.API_URL + '/auth/onboarding-session', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ empresa_id: empresaId })
                });

                if (response.ok) {
                    const data = await response.json();
                    jwtToken = data.token;
                    localStorage.setItem('kirax_auth_token', jwtToken);
                    return true;
                }
            } catch (err) {
                console.error("Erro na autenticação de onboarding:", err);
            }
            return false;
        }

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            appendMessage('user', text);
            userInput.value = '';

            const authed = await ensureAuth();
            if (!authed) {
                appendMessage('ai', "Não consegui validar sua sessão. Por favor, recarregue a página.");
                return;
            }

            try {
                const response = await fetch(KIRAX_CONFIG.API_URL + '/ai/chat', {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${jwtToken}`
                    },
                    body: JSON.stringify({ 
                        prompt: `Você é um consultor de implantação do Kirax CRM. O usuário disse: "${text}". 
                        Seu objetivo é identificar se ele precisa de:
                        - vendas (leads, funil)
                        - relacionamento (fidelização, pós-venda)
                        - varejo (estoque, PDV)
                        - calendario (agendamentos)
                        - campanhas (marketing ativo)
                        - despesas (gestão financeira de campo)

                        Responda de forma curta e amigável. Caso já tenha identificado, diga: "Entendido! Pelo que você me disse, vou configurar os módulos de [MÓDULOS] para você. Podemos prosseguir?"`
                    })
                });

                const data = await response.json();
                appendMessage('ai', data.response || data.text || "Entendido. Como posso ajudar mais?");

                if (data.response && data.response.toLowerCase().includes('podemos prosseguir')) {
                    setupModules(text);
                }
            } catch (err) {
                console.error("Erro na IA:", err);
                appendMessage('ai', "Desculpe, tive um problema de conexão. Tente novamente.");
            }
        }

        async function setupModules(text) {
            const config = {
                vendas: text.includes('venda') || text.includes('lead'),
                relacionamento: text.includes('cliente') || text.includes('fidel'),
                varejo: text.includes('loja') || text.includes('estoque'),
                calendario: text.includes('agenda') || text.includes('horário'),
                campanhas: true,
                despesas: true
            };

            const urlParams = new URLSearchParams(window.location.search);
            const empresaId = urlParams.get('empresa_id') || TEST_EMPRESA_ID;

            if (empresaId && window.kiraxSupabase) {
                const { error } = await window.kiraxSupabase
                    .from('empresas')
                    .update({ modulos_config: config })
                    .eq('id', empresaId);

                if (!error) {
                    appendMessage('ai', "✨ Configuração concluída! Redirecionando você para o seu novo painel...");
                    setTimeout(() => { window.location.href = `crm.html?empresa_id=${empresaId}`; }, 3000);
                } else {
                    console.error('Update Module Config Error:', error);
                    appendMessage('ai', "Houve um problema salvando sua configuração de negócio. Modos de teste ativados!");
                    setTimeout(() => { window.location.href = `crm.html?empresa_id=${empresaId}`; }, 3000);
                }
            } else {
                 appendMessage('ai', "✨ Redirecionando para o demonstrativo (Sem Banco)...");
                 setTimeout(() => { window.location.href = `crm.html?empresa_id=${empresaId}`; }, 3000);
            }
        }
    </script>
</body>
</html>
